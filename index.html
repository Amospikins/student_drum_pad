<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Drum Pad</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h1>Drum Pad</h1>
        <p>Click a pad or press the keyboard keys</p>
        <div class="drum-grid">
            <button class="pad" data-key="A" data-sound="assets/kick.wav"> A <br><span>Kick</span></button>
            <button class="pad" data-key="S" data-sound="assets/snare.wav"> S <br><span>Snare</span></button>
            <button class="pad" data-key="D" data-sound="assets/hihat.wav"> D <br><span>Hi-Hat</span></button>
            <button class="pad" data-key="F" data-sound="assets/clap.wav"> F <br><span>Clap</span></button>
            <button class="pad" data-key="G" data-sound="assets/openhat.wav"> G <br><span>Open Hat</span></button>
            <button class="pad" data-key="H" data-sound="assets/boom.wav"> H <br><span>Boom</span></button>
            <button class="pad" data-key="J" data-sound="assets/tom.wav"> J <br><span>Tom</span></button>
            <button class="pad" data-key="K" data-sound="assets/ride.wav"> K <br><span>Ride</span></button>
            <button class="pad" data-key="L" data-sound="assets/tink.wav"> L <br><span>tink</span></button>
        </div>
    </div>

    <!-- data-key: tells html this is a custom attribute\
key: the name of that custom data attribute, in this case "key"
A: the value of that custom data attribute, in this case "A" 

-->



    <script src="js/main.js"></script>
</body>

</html>
